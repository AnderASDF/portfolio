<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Portfolio Admin</title>
<style>
:root{
  --bg:#1A1225;--surface:#221530;--surface2:#2C1C3E;
  --border:rgba(201,146,43,.18);--gold:#C9922B;--gold-l:#E8B84B;
  --white:#fff;--gray:rgba(255,255,255,.5);
  --purple:#3D1F5C;--green:#4ade80;--red:#f87171;
  --mono:'DM Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--white);display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── Header ─────────────────────────────────────────── */
header{background:var(--purple);padding:0 20px;height:50px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;gap:16px}
.h-title{font-family:var(--mono);font-size:12px;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;flex-shrink:0}
.h-right{display:flex;align-items:center;gap:14px;min-width:0}
.h-status{font-size:11px;color:var(--gray);white-space:nowrap}
.h-status b{color:var(--green)}
.h-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.h-dirty{font-family:var(--mono);font-size:10px;color:var(--gold);opacity:.8}
.h-btn{background:none;border:1px solid var(--border);color:var(--gray);padding:4px 14px;font-size:10px;font-family:var(--mono);font-weight:700;letter-spacing:.1em;text-transform:uppercase;border-radius:2px;cursor:pointer;transition:all .15s;white-space:nowrap}
.h-btn:hover{border-color:var(--gold);color:var(--gold)}
.h-btn.gold{background:var(--gold);color:var(--purple);border-color:var(--gold)}
.h-btn.gold:hover{background:var(--gold-l)}
.h-saved{font-size:10px;color:var(--green);opacity:0;transition:opacity .4s;white-space:nowrap}
.h-saved.show{opacity:1}

/* ── Layout ─────────────────────────────────────────── */
.app{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ─────────────────────────────────────────── */
.sidebar{width:250px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.sb-section{}
.sb-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);background:var(--surface2);position:sticky;top:0;z-index:1}
.sb-label{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
.add-btn{background:none;border:1px solid var(--border);color:var(--gold);font-size:17px;width:22px;height:22px;border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:all .15s}
.add-btn:hover{background:var(--gold);color:var(--purple)}
.sb-list{list-style:none}
.sb-item{padding:7px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;color:var(--gray);display:flex;align-items:center;gap:8px;transition:background .12s}
.sb-item:hover{background:rgba(255,255,255,.05);color:var(--white)}
.sb-item.active{background:var(--purple);color:var(--white)}
.sb-item-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;transition:opacity .15s}
.sb-item.sb-disabled .sb-item-name{opacity:.35}
.sb-period{font-family:var(--mono);font-size:9px;color:var(--gold);opacity:.65;flex-shrink:0}
.sb-floppy{background:none;border:none;color:var(--gold);font-size:13px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0;opacity:.85;transition:all .15s}
.sb-floppy:hover{opacity:1;transform:scale(1.15)}

/* sidebar micro-switch */
.sb-sw{position:relative;display:inline-block;width:26px;height:14px;flex-shrink:0}
.sb-sw input{opacity:0;width:0;height:0;position:absolute}
.sb-sw-track{position:absolute;cursor:pointer;inset:0;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:7px;transition:.15s}
.sb-sw-track:before{content:'';position:absolute;width:8px;height:8px;left:2px;top:2px;background:rgba(255,255,255,.25);border-radius:50%;transition:.15s}
.sb-sw input:checked+.sb-sw-track{background:rgba(201,146,43,.18);border-color:var(--gold)}
.sb-sw input:checked+.sb-sw-track:before{transform:translateX(12px);background:var(--gold)}
/* Main / Sub segmented toggle */
.pms-wrap{display:flex;gap:2px;margin-top:10px;}
.pms-btn{padding:5px 14px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;border-radius:2px;cursor:pointer;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.35);transition:.15s;font-family:var(--mono);}
.pms-btn.active{background:rgba(201,146,43,.18);color:var(--gold);border-color:var(--gold);}
.pms-btn:hover:not(.active){color:rgba(255,255,255,.65);border-color:rgba(255,255,255,.25);}
/* legacy image key placeholder */
.img-thumb.legacy-key{display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.12);}
.img-thumb.legacy-key span{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.3);word-break:break-all;padding:4px;text-align:center;line-height:1.4;}

/* subproject items */
.sb-expand{background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;padding:3px 4px;flex-shrink:0;line-height:0;border-radius:3px;transition:color .15s,opacity .15s,background .15s}
.sb-expand svg{display:block;transition:transform .22s cubic-bezier(.4,0,.2,1);transform:rotate(-90deg)}
.sb-expand.open svg{transform:rotate(0deg)}
.sb-expand:hover{color:var(--gold);background:rgba(201,146,43,.08)}
.sb-expand.no-subs{opacity:0;pointer-events:none}
.sb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-right:2px}
.sb-subitem{padding-left:28px!important;background:rgba(0,0,0,.14)!important;border-bottom:1px solid rgba(255,255,255,.03)!important;border-left:2px solid rgba(201,146,43,.18)!important}
.sb-subitem:hover{background:rgba(0,0,0,.22)!important}
.sb-subitem.active{background:var(--purple)!important;border-left-color:var(--gold)!important}
.sb-sub-add{background:none;border:none;color:rgba(201,146,43,.55);font-size:15px;cursor:pointer;padding:0 3px;flex-shrink:0;line-height:1;opacity:0;transition:opacity .15s,color .15s}
.sb-item:hover .sb-sub-add{opacity:1}
.sb-sub-add:hover{color:var(--gold)}

/* drag-and-drop */
#list-projects .sb-item{cursor:grab}
#list-projects .sb-item:active{cursor:grabbing}
#list-projects .sb-item.dragging{opacity:.3;background:rgba(201,146,43,.04)}
#list-projects .sb-item.drag-over{border-top:2px solid var(--gold)}
#list-views .sb-item,#list-profiles .sb-item{cursor:grab}
#list-views .sb-item:active,#list-profiles .sb-item:active{cursor:grabbing}
#list-views .sb-item.dragging,#list-profiles .sb-item.dragging{opacity:.3;background:rgba(201,146,43,.04)}
#list-views .sb-item.drag-over,#list-profiles .sb-item.drag-over{border-top:2px solid var(--gold)}

/* ── Content pane ──────────────────────────────────────── */
.content-pane{display:flex;flex-direction:column;flex:1;overflow:hidden}

/* ── Sticky form topbar ────────────────────────────────── */
.form-topbar{flex-shrink:0;background:var(--surface2);border-bottom:1px solid var(--border);padding:10px 36px;display:none;align-items:center;gap:14px;flex-wrap:wrap}
.form-topbar.visible{display:flex}
.ftb-title{font-family:'Georgia',serif;font-size:15px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ftb-switches{display:flex;gap:18px;align-items:center;flex-shrink:0}
.ftb-sw{display:flex;align-items:center;gap:7px;transition:opacity .15s}
.ftb-sw.hidden{opacity:0;pointer-events:none}
.ftb-sw-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--gray)}
.ftb-sel{background:var(--surface);border:1px solid var(--border);border-radius:2px;color:var(--white);font-family:var(--mono);font-size:10px;padding:3px 6px;cursor:pointer;transition:border-color .15s}
.ftb-sel:focus{outline:none;border-color:var(--gold)}
.ftb-sel option{background:var(--surface2)}
.ftb-saved{font-size:10px;color:var(--green);opacity:0;transition:opacity .4s;flex-shrink:0;white-space:nowrap}
.ftb-saved.show{opacity:1}
.ftb-save{background:none;border:1px solid var(--border);color:var(--gray);padding:6px 20px;font-size:10px;font-weight:700;letter-spacing:.1em;border-radius:2px;cursor:pointer;flex-shrink:0;font-family:var(--mono);text-transform:uppercase;transition:all .15s}
.ftb-save:hover{border-color:var(--gold);color:var(--gold)}
.ftb-save.dirty{background:var(--gold);color:var(--purple);border-color:var(--gold)}
.ftb-save.dirty:hover{background:var(--gold-l)}

/* ── Main ─────────────────────────────────────────────── */
.main{flex:1;overflow-y:auto;padding:28px 36px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--gray);text-align:center;gap:8px}
.empty h2{font-size:20px;color:rgba(255,255,255,.2)}

/* ── Form ──────────────────────────────────────────────── */
.form-head{font-family:'Georgia',serif;font-size:22px;font-weight:700;margin-bottom:24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.badge{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:1px;border:1px solid;text-transform:uppercase;letter-spacing:.08em;display:inline-block}
.badge.released{color:var(--green);border-color:rgba(74,222,128,.35)}
.badge.unreleased{color:var(--red);border-color:rgba(248,113,113,.35)}
.badge.wip{color:rgba(255,255,255,.4);border-color:rgba(255,255,255,.18)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.full{grid-column:1/-1}
.fg{display:flex;flex-direction:column;gap:5px}
label{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.35)}
input[type=text],textarea,select{background:var(--surface2);border:1px solid var(--border);border-radius:2px;color:var(--white);padding:8px 11px;font-size:13px;width:100%;font-family:inherit;transition:border-color .15s}
input[type=text]:focus,textarea:focus,select:focus{outline:none;border-color:var(--gold)}
textarea{resize:vertical;min-height:90px;line-height:1.6}
select option{background:var(--surface2)}
.tag-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:2px;padding:5px 7px;display:flex;flex-wrap:wrap;gap:5px;min-height:38px;cursor:text;transition:border-color .15s}
.tag-wrap:focus-within{border-color:var(--gold)}
.pill{background:var(--purple);color:rgba(255,255,255,.8);font-size:11px;padding:3px 8px 3px 10px;border-radius:2px;display:flex;align-items:center;gap:4px}
.pill button{background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:13px;line-height:1;padding:0;display:flex;align-items:center}
.pill button:hover{color:var(--red)}
.tag-wrap input{background:none;border:none;outline:none;color:var(--white);font-size:12px;min-width:70px;flex:1;padding:3px 0;font-family:inherit}
.bullet-list{display:flex;flex-direction:column;gap:6px}
.bullet-row{display:flex;gap:6px;align-items:center}
.bullet-row input{flex:1}
.icon-btn{background:none;border:1px solid var(--border);color:rgba(255,255,255,.35);width:30px;height:30px;border-radius:2px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.icon-btn:hover{border-color:var(--red);color:var(--red)}
.icon-btn.add{width:100%;color:var(--gold);border-color:rgba(201,146,43,.35);font-size:12px;margin-top:6px;padding:6px}
.icon-btn.add:hover{background:rgba(201,146,43,.08);border-color:var(--gold)}
.img-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.img-thumb{position:relative;width:78px;height:78px;border-radius:2px;overflow:hidden;border:2px solid transparent;cursor:pointer;transition:border-color .15s;flex-shrink:0}
.img-thumb:hover{border-color:rgba(201,146,43,.5)}
.img-thumb.cover{border-color:var(--gold)}
.img-thumb img{width:100%;height:100%;object-fit:cover;display:block;background:var(--surface2)}
.img-thumb .rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.75);border:none;color:var(--red);width:17px;height:17px;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;line-height:1}
.img-thumb:hover .rm{opacity:1}
.img-thumb.dragging{opacity:.3}
.img-thumb.drag-over{outline:2px solid var(--gold);outline-offset:1px}
.cover-lbl{position:absolute;bottom:0;left:0;right:0;background:rgba(201,146,43,.9);font-size:8px;text-align:center;padding:2px;color:#1A1225;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em}
.upload-zone{border:1px dashed var(--border);border-radius:2px;padding:14px;text-align:center;cursor:pointer;transition:border-color .15s;margin-top:8px;font-size:12px;color:var(--gray)}
.upload-zone:hover{border-color:var(--gold);color:var(--gold-l)}
.upload-zone strong{color:var(--gold)}
.upload-zone input{display:none}
.cover-hint{font-size:11px;color:var(--gray);margin-top:4px}
input[type=range]{-webkit-appearance:none;appearance:none;background:var(--surface2);border:1px solid var(--border);border-radius:2px;height:6px;padding:0;cursor:pointer;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--gold);cursor:pointer}
input[type=range]:focus{outline:none;border-color:var(--gold)}
.ftag-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:4px 0}
.ftag-chip{background:var(--surface2);border:1px solid var(--border);color:var(--gray);font-family:var(--mono);font-size:10px;letter-spacing:.08em;padding:5px 13px;border-radius:2px;cursor:pointer;transition:all .15s;user-select:none}
.ftag-chip:hover{border-color:rgba(201,146,43,.5);color:var(--white)}
.ftag-chip.active{background:rgba(201,146,43,.12);border-color:var(--gold);color:var(--gold-l)}
.switch{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0;position:absolute}
.switch-track{position:absolute;cursor:pointer;inset:0;background:var(--surface2);border:1px solid var(--border);border-radius:10px;transition:.2s}
.switch-track:before{content:'';position:absolute;width:12px;height:12px;left:3px;top:3px;background:rgba(255,255,255,.3);border-radius:50%;transition:.2s}
.switch input:checked+.switch-track{background:rgba(201,146,43,.12);border-color:var(--gold)}
.switch input:checked+.switch-track:before{transform:translateX(16px);background:var(--gold)}
.sec-label{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.22);margin:22px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.actions{display:flex;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);align-items:center}
.btn-del{background:none;border:1px solid rgba(248,113,113,.35);color:var(--red);padding:9px 18px;font-size:12px;border-radius:2px;cursor:pointer;margin-left:auto;transition:all .15s}
.btn-del:hover{background:rgba(248,113,113,.1)}

/* ── Cover grid ──────────────────────────────────────── */
.cg-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px;margin-top:8px}
.cg-item{position:relative;border-radius:2px;overflow:hidden;cursor:grab;border:2px solid transparent;transition:border-color .15s}
.cg-item:active{cursor:grabbing}
.cg-item.dragging{opacity:.3}
.cg-item.drag-over{border-color:var(--gold)}
.cg-item img{width:100%;aspect-ratio:3/2;object-fit:cover;display:block;background:var(--surface2)}
.cg-placeholder{width:100%;aspect-ratio:3/2;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--gray);text-align:center;padding:4px}
.cg-overlay{position:absolute;inset:0;background:linear-gradient(transparent 35%,rgba(0,0,0,.78));opacity:0;transition:opacity .15s;display:flex;flex-direction:column;justify-content:flex-end;padding:6px;gap:3px}
.cg-item:hover .cg-overlay{opacity:1}
.cg-name{font-size:9px;color:rgba(255,255,255,.85);line-height:1.3}
.cg-edit{background:var(--gold);color:var(--purple);border:none;font-size:9px;font-weight:700;padding:3px 7px;border-radius:1px;cursor:pointer;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;align-self:flex-start}
.cg-edit:hover{background:var(--gold-l)}
.cg-num{position:absolute;top:4px;left:5px;background:rgba(0,0,0,.65);color:rgba(255,255,255,.6);font-family:var(--mono);font-size:8px;padding:1px 4px;border-radius:1px}

/* ── Filter tag order pills ──────────────────────────── */
.ftag-order{display:flex;flex-wrap:wrap;gap:6px;min-height:44px;border:1px solid var(--border);border-radius:2px;padding:8px;background:var(--surface2);margin-top:4px}
.ftag-order:empty::after{content:'No tags — add from below';font-size:11px;color:rgba(255,255,255,.2);align-self:center}
.ftag-pill{display:flex;align-items:center;gap:5px;background:rgba(201,146,43,.12);border:1px solid var(--gold);color:var(--gold-l);font-family:var(--mono);font-size:10px;letter-spacing:.07em;padding:5px 8px 5px 5px;border-radius:2px;cursor:grab;user-select:none}
.ftag-pill:active{cursor:grabbing}
.ftag-pill.dragging{opacity:.3}
.ftag-pill.drag-over{border-color:var(--gold-l);background:rgba(201,146,43,.28)}
.ftag-pill .drag-handle{color:rgba(255,255,255,.3);font-size:12px;line-height:1}
.ftag-pill .rm-tag{background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;font-size:14px;line-height:1;padding:0;display:flex;align-items:center;margin-left:2px}
.ftag-pill .rm-tag:hover{color:var(--red)}

/* ── Cover visual preview grid ──────────────────────────────────────── */
.cv-grid{display:grid;grid-template-columns:repeat(var(--cv-cols,6),1fr);gap:5px;margin-top:8px}
.cv-item{position:relative;border-radius:2px;overflow:hidden;cursor:grab;border:2px solid transparent;transition:border-color .15s}
.cv-item:active{cursor:grabbing}
.cv-item.dragging{opacity:.3}
.cv-item.drag-over{border-color:var(--gold)}
.cv-item img{width:100%;height:100%;object-fit:cover;display:block;background:var(--surface2)}
.cv-placeholder{width:100%;height:100%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--gray);text-align:center;padding:4px}
.cv-overlay{position:absolute;inset:0;background:linear-gradient(transparent 35%,rgba(0,0,0,.82));opacity:0;transition:opacity .15s;display:flex;flex-direction:column;justify-content:flex-end;padding:6px;gap:4px}
.cv-item:hover .cv-overlay{opacity:1}
.cv-name{font-size:9px;color:rgba(255,255,255,.85);line-height:1.3;flex:1}
.cv-actions{display:flex;align-items:center;gap:4px}
.cv-edit{background:var(--gold);color:var(--purple);border:none;font-size:9px;font-weight:700;padding:3px 7px;border-radius:1px;cursor:pointer;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.cv-edit:hover{background:var(--gold-l)}
.cv-num{position:absolute;top:4px;left:5px;background:rgba(0,0,0,.65);color:rgba(255,255,255,.6);font-family:var(--mono);font-size:8px;padding:1px 4px;border-radius:1px;pointer-events:none}
.cv-slots{display:flex;gap:2px;flex-shrink:0}
.cv-slot-btn{background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);font-size:8px;font-family:var(--mono);width:18px;height:16px;border-radius:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;padding:0}
.cv-slot-btn.active{background:var(--gold);color:var(--purple);border-color:var(--gold)}
.cv-slot-btn:hover:not(.active){border-color:var(--gold-l);color:var(--gold-l)}
</style>
</head>
<body>

<header>
  <span class="h-title">◈ Portfolio Admin</span>
  <div class="h-right">
    <span class="h-status" id="h-status">connecting…</span>
    <div class="h-actions" id="h-actions" style="display:none">
      <span class="h-dirty" id="h-dirty"></span>
      <span class="h-saved" id="h-saved">✓ All saved</span>
      <button class="h-btn" onclick="restoreAll()">Restore</button>
      <button class="h-btn" id="btn-save-all" onclick="saveAll()">Save All</button>
    </div>
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="sb-section">
      <div class="sb-head">
        <span class="sb-label">Projects</span>
        <button class="add-btn" onclick="newItem('project')" title="Add project">+</button>
      </div>
      <ul class="sb-list" id="list-projects"></ul>
    </div>
    <div class="sb-section">
      <div class="sb-head">
        <span class="sb-label">Work History</span>
        <button class="add-btn" onclick="newItem('career')" title="Add career entry">+</button>
      </div>
      <ul class="sb-list" id="list-career"></ul>
    </div>
    <div class="sb-section">
      <div class="sb-head">
        <span class="sb-label">Skills</span>
        <button class="add-btn" onclick="newItem('skill')" title="Add skill">+</button>
      </div>
      <ul class="sb-list" id="list-skills"></ul>
    </div>
    <div class="sb-section">
      <div class="sb-head">
        <span class="sb-label">Project Views</span>
        <button class="add-btn" onclick="newView()" title="Add view">+</button>
      </div>
      <ul class="sb-list" id="list-views"></ul>
    </div>
    <div class="sb-section">
      <div class="sb-head">
        <span class="sb-label">Socials</span>
        <button class="add-btn" onclick="newSocial()" title="Add social">+</button>
      </div>
      <ul class="sb-list" id="list-socials"></ul>
    </div>
    <div class="sb-section">
      <div class="sb-head">
        <span class="sb-label">Recruiter Profiles</span>
        <button class="add-btn" onclick="newProfile()" title="Add profile">+</button>
      </div>
      <ul class="sb-list" id="list-profiles"></ul>
    </div>
  </aside>

  <div class="content-pane">
    <div class="form-topbar" id="form-topbar">
      <div class="ftb-title" id="ftb-title"></div>
      <div class="ftb-switches" id="ftb-switches"></div>
      <span class="ftb-saved" id="ftb-saved">✓ Saved</span>
      <button class="ftb-save" onclick="saveCurrentItem()">Save</button>
    </div>
    <main class="main" id="main">
      <div class="empty"><h2>Select an entry</h2><p>Choose from the sidebar or add a new one.</p></div>
    </main>
  </div>
</div>

<script>
let DATA = { projects:[], career:[], timeline:[], skills:[], filterViews:[], recruiterProfiles:[], socials:[] }
let curSection = null, curId = null, curParentId = null
let PENDING = {}
let _formModified = false
let _expandedProjects = new Set()

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('/api/data')
    DATA = await res.json()
    if (!DATA.filterViews) DATA.filterViews = []
    if (!DATA.recruiterProfiles) DATA.recruiterProfiles = []
    if (!DATA.socials) DATA.socials = []
    if (!DATA.gridSettings) {
      const fv = DATA.filterViews[0]
      DATA.gridSettings = { columns: fv?.columns || 6, aspectRatio: fv?.aspectRatio || '3/2' }
    }
    renderSidebar()
    document.getElementById('h-status').innerHTML =
      `<b>${DATA.projects.length}</b> projects &middot; <b>${DATA.career.length}</b> work &middot; <b>${(DATA.skills||[]).length}</b> skills`
    document.getElementById('h-actions').style.display = 'flex'
  } catch(e) {
    document.getElementById('h-status').textContent = 'Cannot connect — is npm run admin running?'
  }
}

// ── Pending / Dirty tracking ─────────────────────────────────────────────────
function getFromData(section, id) {
  if (section==='project')    return DATA.projects.find(p=>p.id===id)
  if (section==='career')     return DATA.career.find(c=>c.id===id)
  if (section==='timeline')   return DATA.timeline.find(t=>t.id===id)
  if (section==='skill')      return (DATA.skills||[]).find(s=>s.id===id)
  if (section==='view')       return (DATA.filterViews||[]).find(v=>v.id===id)
  if (section==='profile')    return (DATA.recruiterProfiles||[]).find(r=>r.id===id)
  if (section==='social')     return (DATA.socials||[]).find(s=>s.id===id)
  if (section==='subproject') {
    const sep = id.indexOf(':'); const pid=id.slice(0,sep), sid=id.slice(sep+1)
    return DATA.projects.find(p=>p.id===pid)?.subprojects?.find(s=>s.id===sid)
  }
  return null
}

function getPendingOrData(section, id) {
  return PENDING[`${section}:${id}`] || getFromData(section, id)
}

function updateDirtyCount() {
  const count = Object.keys(PENDING).length
  const el = document.getElementById('h-dirty')
  if (el) el.textContent = count ? `${count} unsaved` : ''
  const hasSomething = count > 0 || _formModified
  document.getElementById('btn-save-all')?.classList.toggle('gold', hasSomething)
  document.querySelector('.ftb-save')?.classList.toggle('dirty', _formModified)
}

function stashCurrentForm() {
  if (!curSection || !curId) return
  const isSub = curSection === 'subproject'
  // For regular items only stash when something changed; for subprojects always attempt
  if (!isSub && !_formModified) return
  const form = document.querySelector('#main form')
  if (!form) return
  let item = null
  try {
    const fd = new FormData(form)
    if (curSection==='project')       item = collectProjectItem(fd)
    else if (curSection==='career')   item = collectCareerItem(fd)
    else if (curSection==='timeline') item = collectTimelineItem(fd)
    else if (curSection==='skill')    item = collectSkillItem(fd)
    else if (curSection==='view')     item = collectViewItem(fd)
    else if (curSection==='profile')  item = collectProfileItem(fd)
    else if (curSection==='social')   item = collectSocialItem(fd)
    else if (isSub)                   item = collectSubprojectItem(fd)
  } catch(e) { console.warn('stash failed', e); return }
  if (!item) return
  const pendingKey = isSub ? `subproject:${curParentId}:${curId}` : `${curSection}:${curId}`
  // For subprojects with no detected changes, skip if data is identical to what's stored
  if (isSub && !_formModified) {
    const stored = getFromData('subproject', `${curParentId}:${curId}`)
    if (stored && JSON.stringify(stored) === JSON.stringify(item)) return
  }
  PENDING[pendingKey] = item
  _formModified = false
  updateDirtyCount()
}

async function applyPending(section, id) {
  const key = `${section}:${id}`
  const item = PENDING[key]
  if (!item) return
  writeToData(section, id, item)
  await postData()
  delete PENDING[key]
  renderSidebar()
  updateDirtyCount()
  if (curSection===section && curId===id) showTopbar(section, item)
  flashSaved('h-saved')
}

async function saveAll() {
  stashCurrentForm()  // capture any unsaved edits on the current form
  if (!Object.keys(PENDING).length) return
  for (const [key, item] of Object.entries(PENDING)) {
    const [sec, ...rest] = key.split(':')
    writeToData(sec, rest.join(':'), item)
  }
  await postData()
  PENDING = {}
  _formModified = false
  renderSidebar()
  updateDirtyCount()
  flashSaved('h-saved')
}

function restoreAll() {
  PENDING = {}
  _formModified = false
  renderSidebar()
  updateDirtyCount()
  if (curSection && curId) {
    const item = getFromData(curSection, curId)
    openForm(curSection, item)
  }
}

function writeToData(section, id, item) {
  if (section==='project') {
    const idx = DATA.projects.findIndex(p=>p.id===id)
    if (idx>=0) DATA.projects[idx]=item; else DATA.projects.push(item)
  } else if (section==='career') {
    const idx = DATA.career.findIndex(c=>c.id===id)
    if (idx>=0) DATA.career[idx]=item; else DATA.career.push(item)
  } else if (section==='timeline') {
    const idx = DATA.timeline.findIndex(t=>t.id===id)
    if (idx>=0) DATA.timeline[idx]=item; else DATA.timeline.push(item)
  } else if (section==='skill') {
    if (!DATA.skills) DATA.skills=[]
    const idx = DATA.skills.findIndex(s=>s.id===id)
    if (idx>=0) DATA.skills[idx]=item; else DATA.skills.push(item)
  } else if (section==='view') {
    const idx = (DATA.filterViews||[]).findIndex(v=>v.id===id)
    if (idx>=0) DATA.filterViews[idx]=item; else DATA.filterViews.push(item)
  } else if (section==='profile') {
    const idx = (DATA.recruiterProfiles||[]).findIndex(r=>r.id===id)
    if (idx>=0) DATA.recruiterProfiles[idx]=item; else DATA.recruiterProfiles.push(item)
  } else if (section==='social') {
    if (!DATA.socials) DATA.socials=[]
    const idx = DATA.socials.findIndex(s=>s.id===id)
    if (idx>=0) DATA.socials[idx]=item; else DATA.socials.push(item)
  } else if (section==='subproject') {
    const sep=id.indexOf(':'); const pid=id.slice(0,sep), sid=id.slice(sep+1)
    const parent=DATA.projects.find(p=>p.id===pid); if(!parent) return
    if(!parent.subprojects) parent.subprojects=[]
    const idx=parent.subprojects.findIndex(s=>s.id===sid)
    if(idx>=0) parent.subprojects[idx]=item; else parent.subprojects.push(item)
  }
}

// ── Collect form → item objects ───────────────────────────────────────────────
function collectProjectItem(fd) {
  const proj = DATA.projects.find(p=>p.id===curId)
  const sbSw = document.querySelector(`#list-projects .sb-item[data-id="${curId}"] .sb-sw input`)
  const visible     = sbSw ? sbSw.checked : (proj?.visible ?? true)
  const inSelection = document.getElementById('sw-inSelection')?.checked ?? (proj?.inSelection ?? true)
  return {
    id: fd.get('id'),
    title: fd.get('title'),
    date: fd.get('date'),
    status: fd.get('status'),
    team: fd.get('team'),
    tags: getTags('tags-wrap'),
    filterTags: getFilterTags(),
    cardSize: fd.get('cardSize'),
    coverImage: document.getElementById('cover-in')?.value || '',
    sub: fd.get('sub'),
    cardDesc: fd.get('cardDesc'),
    description: fd.get('description'),
    images: (() => { try { return JSON.parse(document.getElementById('images-in')?.value||'[]') } catch{ return [] } })(),
    tools: getTags('tools-wrap'),
    link: fd.get('linkUrl') ? { label:fd.get('linkLabel'), url:fd.get('linkUrl') } : null,
    visible,
    inSelection,
    sectionAspectRatio: fd.get('sectionAspectRatio') || 'auto',
    showInTimeline: document.getElementById('sw-timeline')?.checked ?? false,
    subprojects:    proj?.subprojects || []
  }
}
function collectCareerItem(fd) {
  const item = DATA.career.find(c=>c.id===curId)
  const sbSw = document.querySelector(`#list-career .sb-item[data-id="${curId}"] input[type=checkbox]`)
  return { id:fd.get('id'), period:fd.get('period'), role:fd.get('role'), company:fd.get('company'), bullets:getBullets(), visible: sbSw ? sbSw.checked : (item?.visible ?? true) }
}
function collectTimelineItem(fd) {
  return { id:fd.get('id'), period:fd.get('period'), title:fd.get('title'), company:fd.get('company'), status:fd.get('status'), bullets:getBullets(), visible:true }
}
function collectSkillItem(fd) {
  const item = (DATA.skills||[]).find(s=>s.id===curId)
  const sbSw = document.querySelector(`#list-skills .sb-item[data-id="${curId}"] input[type=checkbox]`)
  return { id:fd.get('id'), name:fd.get('name'), abbr:fd.get('abbr'), icon:fd.get('icon')||'', iconColor:fd.get('iconColor')||'', level:Number(fd.get('level')), category:fd.get('category'), visible: sbSw ? sbSw.checked : (item?.visible ?? true) }
}
function collectViewItem(fd) {
  const item = (DATA.filterViews||[]).find(v=>v.id===curId)
  const sbSw = document.querySelector(`#list-views .sb-item[data-id="${curId}"] input[type=checkbox]`)
  return { id:curId, label:fd.get('label'), tag:fd.get('tag'), projectOrder:getCoverOrder('cg-view'), cardSizes:getCoverCardSizes('cg-view'), visible: sbSw ? sbSw.checked : (item?.visible ?? true) }
}
function collectProfileItem(fd) {
  const item = (DATA.recruiterProfiles||[]).find(r=>r.id===curId)
  const sbSw = document.querySelector(`#list-profiles .sb-item[data-id="${curId}"] input[type=checkbox]`)
  return { id:curId, label:fd.get('label'), tag:fd.get('tag'), filterTags:getFilterTagOrder(), projectOrder:getCoverOrder('cg-profile'), cardSizes:getCoverCardSizes('cg-profile'), visible: sbSw ? sbSw.checked : (item?.visible ?? true) }
}

// ── Sidebar enable switch ─────────────────────────────────────────────────────
function sbSwitchHtml(section, id, isVisible, parentId) {
  const extra = parentId ? `,'${parentId}'` : ''
  return `<label class="sb-sw" onclick="event.stopPropagation()" title="Enable / Disable">
    <input type="checkbox"${isVisible?' checked':''} onchange="toggleVisible('${section}','${id}',this.checked${extra})">
    <span class="sb-sw-track"></span>
  </label>`
}

async function toggleInSelection(id, value) {
  const proj = DATA.projects.find(p => p.id === id)
  if (proj) { proj.inSelection = value; await postData() }
  const key = `project:${id}`
  if (PENDING[key]) PENDING[key].inSelection = value
}

async function setInSelectionMode(value) {
  const projId = curSection === 'subproject' ? curParentId : curId
  const proj = DATA.projects.find(p => p.id === projId)
  if (!proj) return
  proj.inSelection = value
  const pk = `project:${projId}`
  if (PENDING[pk]) PENDING[pk].inSelection = value
  await postData()
  renderSidebar()
  document.querySelectorAll('.pms-btn').forEach((btn, i) => btn.classList.toggle('active', i === 0 ? value : !value))
  const sw = document.getElementById('sw-inSelection')
  if (sw) sw.checked = value
}

async function toggleVisible(section, id, value, parentId) {
  if (section==='subproject') {
    const parent=DATA.projects.find(p=>p.id===parentId)
    const sub=parent?.subprojects?.find(s=>s.id===id)
    if (sub) { sub.visible=value; await postData() }
    const key=`subproject:${parentId}:${id}`
    if (PENDING[key]) PENDING[key].visible=value
    const li=document.querySelector(`[data-id="${id}"].sb-subitem`)
    if (li) li.classList.toggle('sb-disabled', !value)
    return
  }
  const dataItem = getFromData(section, id)
  if (dataItem) {
    dataItem.visible = value
    await postData()
    const key = `${section}:${id}`
    if (PENDING[key]) PENDING[key].visible = value
  } else {
    const key = `${section}:${id}`
    if (!PENDING[key]) PENDING[key] = {}
    PENDING[key].visible = value
  }
  const li = document.querySelector(`[data-id="${id}"]:not(.sb-subitem)`)
  if (li) li.classList.toggle('sb-disabled', !value)
  if (section==='project' && curSection==='project' && curId===id) {
    updateTopbarSwitchVisibility(value)
  }
}

// ── Form topbar ───────────────────────────────────────────────────────────────
function showTopbar(section, item) {
  const titleEl  = document.getElementById('ftb-title')
  const switchEl = document.getElementById('ftb-switches')
  const name = section==='project'    ? (item?.title||'New Project')
    : section==='career'     ? (item?.role||'New Career Entry')
    : section==='skill'      ? (item?.name||'New Skill')
    : section==='view'       ? (item?.label||'New View')
    : section==='profile'    ? (item?.label||'New Profile')
    : section==='social'     ? (item?.label||'New Social')
    : section==='subproject' ? (item?.title||'New Section')
    : 'Edit'
  titleEl.textContent = name
  if (section==='project') {
    const a = item?.inSelection !== false
    const t = !!item?.showInTimeline
    const isEnabled = item?.visible !== false
    switchEl.innerHTML = `
      <div class="ftb-sw${isEnabled?'':' hidden'}" id="ftb-sw-all">
        <span class="ftb-sw-label">Grid</span>
        <label class="switch"><input type="checkbox" id="sw-inSelection"${a?' checked':''} onchange="switchAutoSave('inSelection',this.checked)"><span class="switch-track"></span></label>
      </div>
      <div class="ftb-sw${isEnabled?'':' hidden'}" id="ftb-sw-timeline">
        <span class="ftb-sw-label">Timeline</span>
        <label class="switch"><input type="checkbox" id="sw-timeline"${t?' checked':''} onchange="switchAutoSave('showInTimeline',this.checked)"><span class="switch-track"></span></label>
      </div>`
  } else if (section === 'subproject') {
    const a = item?.inSelection !== false
    switchEl.innerHTML = `
      <div class="ftb-sw" id="ftb-sw-all">
        <span class="ftb-sw-label">All</span>
        <label class="switch"><input type="checkbox" id="sub-sw-inSelection"${a?' checked':''} onchange="subSwitchAutoSave('inSelection',this.checked)"><span class="switch-track"></span></label>
      </div>`
  } else if (section === 'view') {
    const cols  = DATA.gridSettings?.columns || 6
    const ratio = DATA.gridSettings?.aspectRatio || '3/2'
    switchEl.innerHTML = `
      <div class="ftb-sw">
        <span class="ftb-sw-label">Cols</span>
        <select class="ftb-sel" onchange="gridSettingChange('columns',parseInt(this.value))">${[1,2,3,4,5,6].map(n=>`<option value="${n}"${cols===n?' selected':''}>${n}</option>`).join('')}</select>
      </div>
      <div class="ftb-sw">
        <span class="ftb-sw-label">Ratio</span>
        <select class="ftb-sel" onchange="gridSettingChange('aspectRatio',this.value)">${['1/1','4/3','3/2','16/9'].map(r=>`<option${ratio===r?' selected':''}>${r}</option>`).join('')}</select>
      </div>`
  } else {
    switchEl.innerHTML = ''
  }
  document.getElementById('form-topbar').classList.add('visible')
}

function hideTopbar() {
  document.getElementById('form-topbar').classList.remove('visible')
}

function updateTopbarSwitchVisibility(isEnabled) {
  document.querySelectorAll('#ftb-switches .ftb-sw').forEach(sw => {
    sw.classList.toggle('hidden', !isEnabled)
  })
}

async function switchAutoSave(field, value) {
  if (curSection !== 'project' || !curId) return
  const proj = DATA.projects.find(p=>p.id===curId)
  if (!proj) return
  proj[field] = value
  await postData()
  flashSaved('ftb-saved')
  renderSidebar()
}

async function subSwitchAutoSave(field, value) {
  if (curSection!=='subproject'||!curId||!curParentId) return
  const parent=DATA.projects.find(p=>p.id===curParentId)
  const sub=parent?.subprojects?.find(s=>s.id===curId)
  if (!sub) return
  sub[field]=value; await postData(); flashSaved('ftb-saved')
}

// ── Subprojects ───────────────────────────────────────────────────────────────
function toggleExpand(parentId) {
  if (_expandedProjects.has(parentId)) _expandedProjects.delete(parentId)
  else _expandedProjects.add(parentId)
  renderSidebar()
}

function editSubproject(parentId, subId) {
  if (curSection!=='subproject'||curId!==subId||curParentId!==parentId) stashCurrentForm()
  curSection='subproject'; curId=subId; curParentId=parentId
  const parent=DATA.projects.find(p=>p.id===parentId)
  const compId=`${parentId}:${subId}`
  const sub=PENDING[`subproject:${compId}`] || getFromData('subproject', compId)
  if (!sub||!parent) return
  renderSidebar()
  _formModified=false
  document.getElementById('main').innerHTML=subprojectForm(parent, sub)
  document.getElementById('main').scrollTop=0
  initImageDrag()
  showTopbar('subproject', sub)
  attachFormChangeListener()
  updateDirtyCount()
}

function newSubproject(parentId) {
  stashCurrentForm()
  const parent=DATA.projects.find(p=>p.id===parentId); if(!parent) return
  curSection='subproject'; curParentId=parentId; curId='sub_'+Date.now()
  const maxOrder=Math.max(0,...(parent.subprojects||[]).map(s=>s.order||0))
  const blank={id:curId,title:'',order:maxOrder+1,coverImage:'',images:[],tags:[],filterTags:'',cardSize:'default',inSelection:true,visible:true,description:'',tools:[],sectionAspectRatio:'auto'}
  _expandedProjects.add(parentId)
  renderSidebar()
  _formModified=false
  document.getElementById('main').innerHTML=subprojectForm(parent, blank)
  document.getElementById('main').scrollTop=0
  initImageDrag()
  showTopbar('subproject', blank)
  attachFormChangeListener()
}

function subprojectForm(parent, sub) {
  const parentInSel = parent.inSelection !== false
  const imgHtml=(sub.images||[]).map(img=>{
    if(!img.startsWith('data/images/')) return `<div class="img-thumb legacy-key" data-img="${img}" title="${img}"><span>${img}</span><button class="rm" onclick="removeImage(event,'${img}')" type="button">×</button></div>`
    return `<div class="img-thumb${img===sub.coverImage?' cover':''}" onclick="setCover('${img}')" data-img="${img}">
      <img src="/${img}" onerror="this.style.opacity='.3'">
      <button class="rm" onclick="removeImage(event,'${img}')" type="button">×</button>
      ${img===sub.coverImage?'<div class="cover-lbl">cover</div>':''}
    </div>`
  }).join('')
  const ALL_FILTER_TAGS=(DATA.filterViews||[]).filter(v=>v.id!=='all'&&v.tag).map(v=>v.tag)
  return `
  <div class="form-head">${esc(sub.title)||'New Section'} <span style="font-size:13px;color:rgba(255,255,255,.3);font-family:var(--mono);font-weight:400">↳ ${esc(parent.title)}</span>
    <div class="pms-wrap">
      <button type="button" class="pms-btn${parentInSel?' active':''}" onclick="setInSelectionMode(true)">Main Project</button>
      <button type="button" class="pms-btn${!parentInSel?' active':''}" onclick="setInSelectionMode(false)">Sub Only</button>
    </div>
  </div>
  <form onsubmit="saveSubproject(event)">
    <div class="grid2">
      <div class="fg"><label>ID (slug)</label><input type="text" name="id" value="${esc(sub.id)}" required></div>
      <div class="fg"><label>Title</label><input type="text" name="title" value="${esc(sub.title)}" required oninput="updateHead(this.value);document.getElementById('ftb-title').textContent=this.value||'New Section'"></div>
      <div class="fg"><label>Order</label><input type="number" name="order" value="${sub.order||1}" min="1"></div>
      <div class="fg"><label>Card Size</label>
        <select name="cardSize">
          <option value="default"${(sub.cardSize||'default')==='default'?' selected':''}>Default (1 col)</option>
          <option value="featured"${sub.cardSize==='featured'?' selected':''}>Featured (2 cols)</option>
          <option value="wide"${sub.cardSize==='wide'?' selected':''}>Wide (3 cols)</option>
          <option value="vertical"${sub.cardSize==='vertical'?' selected':''}>Vertical (portrait)</option>
        </select>
      </div>
      <div class="fg full"><label>Display Tags <span style="opacity:.5">(added to parent tags in modal)</span></label>
        <div class="tag-wrap" id="tags-wrap" onclick="focusTag('tags-in')">${pills(sub.tags||[])}<input id="tags-in" type="text" placeholder="Add tag, press Enter…" onkeydown="addTag(event,'tags-wrap','tags-in')"></div>
      </div>
      <div class="fg full"><label>Filter Tags <span style="opacity:.5">(for grid filtering)</span></label>
        <div class="ftag-wrap">${ALL_FILTER_TAGS.map(t=>{const on=(sub.filterTags||'').split(' ').includes(t);return`<button type="button" class="ftag-chip${on?' active':''}" data-tag="${t}" onclick="this.classList.toggle('active')">${t}</button>`}).join('')}</div>
      </div>
      <div class="fg full"><label>Short Description <span style="opacity:.5">(shown on card hover)</span></label>
        <input type="text" name="description" value="${esc(sub.description||'')}" placeholder="Brief description of this section…">
      </div>
    </div>
    <div class="sec-label">Images</div>
    <p class="cover-hint">Click an image to set as cover.</p>
    <div class="img-grid" id="img-grid">${imgHtml}</div>
    <div style="display:flex;gap:8px;align-items:stretch;margin-top:8px">
      <div class="upload-zone" id="upload-zone" style="flex:1;margin-top:0">
        <input type="file" id="img-input" accept="image/*" multiple onchange="uploadImages(this)">
        <strong>Click to upload</strong> or drag &amp; drop
      </div>
      <button type="button" onclick="clearAllImages()" title="Delete all images" style="flex-shrink:0;background:none;border:1px solid rgba(248,113,113,.3);color:var(--red);border-radius:2px;padding:0 14px;font-size:11px;cursor:pointer;transition:background .15s;white-space:nowrap" onmouseover="this.style.background='rgba(248,113,113,.08)'" onmouseout="this.style.background='none'">× Clear all</button>
    </div>

function collectSubprojectItem(fd) {
  const parent=DATA.projects.find(p=>p.id===curParentId)
  const existing=parent?.subprojects?.find(s=>s.id===curId)
  const li=document.querySelector(`#list-projects .sb-subitem[data-id="${curId}"] input[type=checkbox]`)
  const visible=li?li.checked:(existing?.visible??true)
  return {
    id: fd.get('id'),
    title: fd.get('title'),
    order: parseInt(fd.get('order'))||1,
    coverImage: document.getElementById('cover-in')?.value||'',
    images: (()=>{try{return JSON.parse(document.getElementById('images-in')?.value||'[]')}catch{return[]}})(),
    tags: getTags('tags-wrap'),
    filterTags: getFilterTags(),
    cardSize: fd.get('cardSize')||'default',
    inSelection: document.getElementById('sub-sw-inSelection')?.checked??true,
    visible,
    description: fd.get('description')||'',
    tools: [...document.querySelectorAll('#tools-wrap .ftag-chip.active')].map(b=>b.dataset.tool),
    sectionAspectRatio: fd.get('sectionAspectRatio')||'auto'
  }
}

async function saveSubproject(e) {
  e.preventDefault()
  const fd=new FormData(e.target)
  const item=collectSubprojectItem(fd)
  curId=item.id
  writeToData('subproject', `${curParentId}:${item.id}`, item)
  await postData()
  delete PENDING[`subproject:${curParentId}:${item.id}`]
  _formModified=false
  flashSaved('ftb-saved')
  renderSidebar(); updateDirtyCount()
}

async function deleteSubproject() {
  if (!confirm('Delete this section?')) return
  const parent=DATA.projects.find(p=>p.id===curParentId)
  if (parent) parent.subprojects=(parent.subprojects||[]).filter(s=>s.id!==curId)
  delete PENDING[`subproject:${curParentId}:${curId}`]
  await postData()
  curSection=null; curId=null; curParentId=null; hideTopbar()
  renderSidebar(); updateDirtyCount()
  document.getElementById('main').innerHTML='<div class="empty"><h2>Deleted</h2><p>Choose another entry or add a new one.</p></div>'
}

async function gridSettingChange(field, value) {
  if (!DATA.gridSettings) DATA.gridSettings = { columns:6, aspectRatio:'3/2' }
  DATA.gridSettings[field] = value
  await postData()
  flashSaved('ftb-saved')
  const grid = document.getElementById('cg-view') || document.getElementById('cg-profile')
  if (grid) {
    if (field==='columns') grid.style.setProperty('--cv-cols', value)
    if (field==='aspectRatio') grid.style.setProperty('--cv-ratio', value)
    updateCvGridRows(grid.id)
  }
}

}

function renderSidebar() {
  document.getElementById('list-projects').innerHTML = DATA.projects.map(p => {
    const dirty   = !!PENDING[`project:${p.id}`]
    const enabled = p.visible !== false
    const inSel   = p.inSelection !== false
    const hasSubs = (p.subprojects||[]).length > 0
    const expanded = _expandedProjects.has(p.id)
    const dotColor = p.status==='released'?'var(--green)':p.status==='unreleased'?'var(--red)':'rgba(255,255,255,.18)'
    let html = `<li class="sb-item${curSection==='project'&&curId===p.id?' active':''}${enabled?'':' sb-disabled'}" draggable="true" data-id="${p.id}" onclick="editItem('project','${p.id}')">
      ${sbSwitchHtml('project', p.id, enabled)}
      <span class="sb-dot" style="background:${dotColor}" title="${p.status||'wip'}"></span>
      <span class="sb-item-name">${esc(p.title)}</span>
      ${dirty?`<button class="sb-floppy" onclick="event.stopPropagation();applyPending('project','${p.id}')" title="Unsaved — click to save">💾</button>`:''}
      <button class="sb-sub-add" onclick="event.stopPropagation();newSubproject('${p.id}')" title="Add section">+</button>
      <button class="sb-expand${expanded?' open':''}${hasSubs?'':' no-subs'}" onclick="event.stopPropagation();toggleExpand('${p.id}')" title="Toggle sections">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </li>`
    if (hasSubs && expanded) {
      html += [...(p.subprojects||[])].sort((a,b)=>(a.order||0)-(b.order||0)).map(sub => {
        const subDirty = !!PENDING[`subproject:${p.id}:${sub.id}`]
        const subEnabled = sub.visible !== false
        return `<li class="sb-item sb-subitem${curSection==='subproject'&&curId===sub.id?' active':''}${subEnabled?'':' sb-disabled'}" data-id="${sub.id}" data-parent="${p.id}" onclick="editSubproject('${p.id}','${sub.id}')">

          <span class="sb-item-name">${esc(sub.title)}</span>

        </li>`

    }

  }).join('')
  initProjectDrag()

  const career = [...DATA.career].sort((a,b) => sbYear(b.period) - sbYear(a.period))
  document.getElementById('list-career').innerHTML = career.map(c => {
    const dirty   = !!PENDING[`career:${c.id}`]

    return `<li class="sb-item${curSection==='career'&&curId===c.id?' active':''}${enabled?'':' sb-disabled'}" data-id="${c.id}" onclick="editItem('career','${c.id}')">
      ${sbSwitchHtml('career', c.id, enabled)}
      <span class="sb-item-name">${esc(c.role)}</span>
      ${dirty?`<button class="sb-floppy" onclick="event.stopPropagation();applyPending('career','${c.id}')" title="Unsaved — click to save">💾</button>`:''}
      <span class="sb-period">${(c.period||'').split('–')[0].trim()}</span>
    </li>`
  }).join('')

  document.getElementById('list-skills').innerHTML = (DATA.skills||[]).map(s => {
    const dirty   = !!PENDING[`skill:${s.id}`]
    const enabled = s.visible !== false
    return `<li class="sb-item${curSection==='skill'&&curId===s.id?' active':''}${enabled?'':' sb-disabled'}" data-id="${s.id}" onclick="editItem('skill','${s.id}')">

      ${dirty?`<button class="sb-floppy" onclick="event.stopPropagation();applyPending('skill','${s.id}')" title="Unsaved — click to save">💾</button>`:''}
      <span class="sb-period">${s.category||''}</span>
    </li>`
  }).join('')

  document.getElementById('list-socials').innerHTML = (DATA.socials||[]).map(s => {
    const dirty = !!PENDING[`social:${s.id}`]

function sbYear(str) {
  const m = String(str||'').match(/\d{4}/); return m ? parseInt(m[0],10) : 0
}

// ── Navigate to item ──────────────────────────────────────────────────────────
function editItem(section, id) {
  if (curSection !== section || curId !== id) stashCurrentForm()
  curSection = section; curId = id
  const item = getPendingOrData(section, id)
  renderSidebar()
  openForm(section, item)
}

function openForm(section, item) {
  _formModified = false; updateDirtyCount()
  const main = document.getElementById('main')
  if (section==='project')       main.innerHTML = projectForm(item)
  else if (section==='career')   main.innerHTML = careerForm(item)
  else if (section==='timeline') main.innerHTML = timelineForm(item)
  else if (section==='social')   main.innerHTML = socialForm(item)
  else                           main.innerHTML = skillForm(item)
  main.scrollTop = 0
  if (section==='project') initImageDrag()
  showTopbar(section, item)
  attachFormChangeListener()
}

function attachFormChangeListener() {
  const form = document.querySelector('#main form')
  if (!form) return
  const mark = () => { _formModified = true; updateDirtyCount() }
  form.addEventListener('input',  mark)
  form.addEventListener('change', mark)
}

function newItem(section) {
  stashCurrentForm()
  curSection = section
  curId = 'new_' + Date.now()
  const blank = section==='project'
    ? { id:curId, title:'', date:'', status:'wip', team:'', tags:[], filterTags:'', cardSize:'default', coverImage:'', sub:'', cardDesc:'', description:'', images:[], tools:[], link:null, visible:true, inSelection:true, showInTimeline:false }
    : section==='career'
    ? { id:curId, period:'', role:'', company:'', bullets:[], visible:true }
    : section==='timeline'
    ? { id:curId, period:'', title:'', company:'', status:'wip', bullets:[], visible:true }
    : section==='social'
    ? { id:curId, label:'', href:'', title:'', iconType:'email', iconFile:'', target:'' }
    : { id:curId, name:'', abbr:'', level:75, category:'Concept Art', visible:true }
  openForm(section, blank)
}

function focusTag(id) { document.getElementById(id)?.focus() }
function addTag(e, wrapId, inputId) {
  if (e.key!=='Enter' && e.key!==',') return

// ── Image helpers ─────────────────────────────────────────────────────────────
async function uploadImages(input) {
  const id = document.querySelector('[name=id]')?.value || 'temp'
  for (const file of input.files) {
    const fd = new FormData()
    fd.append('image', file)
    const res = await fetch(`/api/upload/${id}`, { method:'POST', body:fd })
    const { path } = await res.json()
    addThumb(path)
  }
  input.value = ''
  updateImagesIn()
  _formModified = true; updateDirtyCount()
}
function addThumb(p) {
  const grid = document.getElementById('img-grid')
  const div = document.createElement('div')
  div.className = 'img-thumb'; div.dataset.img = p; div.onclick = () => setCover(p)
  div.innerHTML = `<img src="/${p}"><button class="rm" onclick="removeImage(event,'${p}')" type="button">×</button>`
  grid.appendChild(div)
  initOneImageDrag(div)
  updateImagesIn()
}
function setCover(img) {
  const ci = document.getElementById('cover-in')
  if (ci?.value === img) {
    document.querySelectorAll('.img-thumb').forEach(t=>{t.classList.remove('cover');t.querySelector('.cover-lbl')?.remove()})
    ci.value = ''
    _formModified = true; updateDirtyCount()
    return
  }
  document.querySelectorAll('.img-thumb').forEach(t=>{t.classList.remove('cover');t.querySelector('.cover-lbl')?.remove()})
  const th = document.querySelector(`.img-thumb[data-img="${img}"]`)
  if (th) {
    th.classList.add('cover')
    const l=document.createElement('div');l.className='cover-lbl';l.textContent='cover';th.appendChild(l)
    const grid=document.getElementById('img-grid')
    if (grid && grid.firstChild !== th) grid.insertBefore(th, grid.firstChild)
  }
  if (ci) ci.value = img
  updateImagesIn()
  _formModified = true; updateDirtyCount()
}
async function clearAllImages() {
  const imgs = [...document.querySelectorAll('#img-grid .img-thumb')].map(t => t.dataset.img).filter(Boolean)
  if (!imgs.length) return
  if (!confirm(`Delete all ${imgs.length} image${imgs.length>1?'s':''}?`)) return
  const uploads = imgs.filter(p => p.startsWith('data/images/'))
  await Promise.all(uploads.map(p => fetch('/api/image',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:p})})))
  document.getElementById('img-grid').innerHTML = ''
  document.getElementById('cover-in').value = ''
  document.getElementById('images-in').value = '[]'
  _formModified = true; updateDirtyCount()
}
async function removeImage(e, img) {
  e.stopPropagation()
  if (!confirm('Remove this image from disk?')) return
  if (img.startsWith('data/images/')) await fetch('/api/image',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:img})})
  document.querySelector(`.img-thumb[data-img="${img}"]`)?.remove()
  const ci = document.getElementById('cover-in'); if (ci?.value===img) ci.value=''
  updateImagesIn(); _formModified = true; updateDirtyCount()
}
function updateImagesIn() {
  const imgs = [...document.querySelectorAll('.img-thumb')].map(t=>t.dataset.img)
  const el = document.getElementById('images-in'); if (el) el.value = JSON.stringify(imgs)
}

// ── Save ──────────────────────────────────────────────────────────────────────
async function saveItem(e) {
  e.preventDefault()
  const fd = new FormData(e.target)
  let item
  if (curSection==='project')       item = collectProjectItem(fd)
  else if (curSection==='career')   item = collectCareerItem(fd)
  else if (curSection==='timeline') item = collectTimelineItem(fd)
  else if (curSection==='social')   item = collectSocialItem(fd)
  else                              item = collectSkillItem(fd)
  curId = item.id
  writeToData(curSection, item.id, item)
  await postData()
  delete PENDING[`${curSection}:${item.id}`]
  _formModified = false
  flashSaved('ftb-saved')
  renderSidebar(); updateDirtyCount()
  document.getElementById('h-status').innerHTML =
    `<b>${DATA.projects.length}</b> projects &middot; <b>${DATA.career.length}</b> work &middot; <b>${(DATA.skills||[]).length}</b> skills`
}

// ── Delete ────────────────────────────────────────────────────────────────────
async function deleteItem() {
  if (!confirm('Delete this entry?')) return
  if (curSection==='project')       DATA.projects = DATA.projects.filter(p=>p.id!==curId)
  else if (curSection==='career')   DATA.career   = DATA.career.filter(c=>c.id!==curId)
  else if (curSection==='timeline') DATA.timeline = DATA.timeline.filter(t=>t.id!==curId)
  else if (curSection==='social') DATA.socials = (DATA.socials||[]).filter(s=>s.id!==curId)
  else DATA.skills = (DATA.skills||[]).filter(s=>s.id!==curId)
  delete PENDING[`${curSection}:${curId}`]
  await postData()
  curSection=null; curId=null; hideTopbar()
  renderSidebar(); updateDirtyCount()
  document.getElementById('main').innerHTML='<div class="empty"><h2>Deleted</h2><p>Choose another entry or add a new one.</p></div>'
}

document.addEventListener('click', e=>{

})
document.addEventListener('dragover', e=>e.preventDefault())

  e.preventDefault()
  if (!document.getElementById('upload-zone')) return
  const files=[...e.dataTransfer.files].filter(f=>f.type.startsWith('image/'))

// ── Escape helper ─────────────────────────────────────────────────────────────
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

// ── Drag-and-drop project reorder ─────────────────────────────────────────────
let _dragId = null
function initProjectDrag() {
  document.querySelectorAll('#list-projects .sb-item:not(.sb-subitem)').forEach(li=>{
    li.addEventListener('dragstart', e=>{ _dragId=li.dataset.id; li.classList.add('dragging'); e.dataTransfer.effectAllowed='move' })
    li.addEventListener('dragend', ()=>{ li.classList.remove('dragging'); document.querySelectorAll('#list-projects .sb-item').forEach(i=>i.classList.remove('drag-over')) })
    li.addEventListener('dragover', e=>{ e.preventDefault(); document.querySelectorAll('#list-projects .sb-item').forEach(i=>i.classList.remove('drag-over')); if(li.dataset.id!==_dragId)li.classList.add('drag-over') })
    li.addEventListener('dragleave', ()=>li.classList.remove('drag-over'))
    li.addEventListener('drop', e=>{
      e.preventDefault()
      const tgtId=li.dataset.id; if(!_dragId||_dragId===tgtId) return
      const from=DATA.projects.findIndex(p=>p.id===_dragId), to=DATA.projects.findIndex(p=>p.id===tgtId)
      if(from<0||to<0) return
      DATA.projects.splice(to,0,DATA.projects.splice(from,1)[0])
      postData(); renderSidebar()
    })
  })
}

// ── Image grid drag-and-drop reorder ─────────────────────────────────────────
let _imgDragThumb = null
function initImageDrag() {
  document.querySelectorAll('#img-grid .img-thumb').forEach(initOneImageDrag)
}
function initOneImageDrag(thumb) {
  thumb.draggable = true
  thumb.addEventListener('dragstart', e => { _imgDragThumb = thumb; thumb.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; e.stopPropagation() })
  thumb.addEventListener('dragend', () => { thumb.classList.remove('dragging'); document.querySelectorAll('#img-grid .img-thumb').forEach(t => t.classList.remove('drag-over')) })
  thumb.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); document.querySelectorAll('#img-grid .img-thumb').forEach(t => t.classList.remove('drag-over')); if (thumb !== _imgDragThumb) thumb.classList.add('drag-over') })
  thumb.addEventListener('dragleave', () => thumb.classList.remove('drag-over'))
  thumb.addEventListener('drop', e => {
    e.preventDefault(); e.stopPropagation()
    if (!_imgDragThumb || _imgDragThumb === thumb) return
    const grid = document.getElementById('img-grid')
    const thumbs = [...grid.querySelectorAll('.img-thumb')]
    const from = thumbs.indexOf(_imgDragThumb), to = thumbs.indexOf(thumb)
    if (from < to) grid.insertBefore(_imgDragThumb, thumb.nextSibling)
    else grid.insertBefore(_imgDragThumb, thumb)
    updateImagesIn(); _formModified = true; updateDirtyCount()
  })
}

// ── Shared helpers ─────────────────────────────────────────────────────────────
function cgThumb(p) {
  if (p.coverImage&&p.coverImage.startsWith('data/images/')) return '/'+p.coverImage
  const file=(p.images||[]).find(i=>i.startsWith('data/images/')); return file?'/'+file:''
}

// ── Cover grid drag ───────────────────────────────────────────────────────────
let _cgDragId = null
function initCoverDrag(containerId) {
  const container=document.getElementById(containerId); if(!container) return
  container.querySelectorAll('.cv-item').forEach(item=>{
    item.addEventListener('dragstart', e=>{ _cgDragId=item.dataset.id; item.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; e.stopPropagation() })
    item.addEventListener('dragend', ()=>{ item.classList.remove('dragging'); container.querySelectorAll('.cv-item').forEach(i=>i.classList.remove('drag-over')); updateCoverNumbers(containerId) })
    item.addEventListener('dragover', e=>{ e.preventDefault(); e.stopPropagation(); container.querySelectorAll('.cv-item').forEach(i=>i.classList.remove('drag-over')); if(item.dataset.id!==_cgDragId)item.classList.add('drag-over') })
    item.addEventListener('dragleave', ()=>item.classList.remove('drag-over'))
    item.addEventListener('drop', e=>{
      e.preventDefault(); e.stopPropagation()
      const tgtId=item.dataset.id; if(!_cgDragId||_cgDragId===tgtId) return
      const items=[...container.querySelectorAll('.cv-item')]
      const from=items.findIndex(i=>i.dataset.id===_cgDragId), to=items.findIndex(i=>i.dataset.id===tgtId)
      if(from<0||to<0) return
      const el=items[from]; container.removeChild(el)
      const refreshed=[...container.querySelectorAll('.cv-item')]
      if(to>=refreshed.length) container.appendChild(el); else container.insertBefore(el,refreshed[to])
      updateCoverNumbers(containerId); _formModified=true; updateDirtyCount()
    })
  })
}

  const editFn=p._parentId?`editSubproject('${p._parentId}','${p._subId}')`:`editItem('project','${p.id}')`
  return `<div class="cg-item" draggable="true" data-id="${esc(p.id)}">
    ${thumb?`<img src="${thumb}" onerror="this.style.opacity='.3'">`:`<div class="cg-placeholder">${esc(name)}</div>`}
    <span class="cg-num">${index+1}</span>
    <div class="cg-overlay">
      <div class="cg-name">${esc(name)}</div>
      <button class="cg-edit" type="button" onclick="${editFn}">Edit</button>
    </div>
  </div>`
}

// ── Filter tag order (profile form) ──────────────────────────────────────────
let _ftDragTag = null
function initFilterTagDrag() {
  const container=document.getElementById('ftag-order'); if(!container) return
  container.querySelectorAll('.ftag-pill').forEach(pill=>{
    pill.addEventListener('dragstart', e=>{ _ftDragTag=pill.dataset.tag; pill.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; e.stopPropagation() })
    pill.addEventListener('dragend', ()=>{ pill.classList.remove('dragging'); container.querySelectorAll('.ftag-pill').forEach(p=>p.classList.remove('drag-over')) })
    pill.addEventListener('dragover', e=>{ e.preventDefault(); e.stopPropagation(); container.querySelectorAll('.ftag-pill').forEach(p=>p.classList.remove('drag-over')); if(pill.dataset.tag!==_ftDragTag)pill.classList.add('drag-over') })
    pill.addEventListener('dragleave', ()=>pill.classList.remove('drag-over'))
    pill.addEventListener('drop', e=>{
      e.preventDefault(); e.stopPropagation()
      const tgt=pill.dataset.tag; if(!_ftDragTag||_ftDragTag===tgt) return
      const pills=[...container.querySelectorAll('.ftag-pill')]
      const from=pills.findIndex(p=>p.dataset.tag===_ftDragTag), to=pills.findIndex(p=>p.dataset.tag===tgt)
      if(from<0||to<0) return
      const el=pills[from]; container.removeChild(el)
      const refreshed=[...container.querySelectorAll('.ftag-pill')]
      if(to>=refreshed.length) container.appendChild(el); else container.insertBefore(el,refreshed[to])
      _formModified=true
    })
  })
}
function getFilterTagOrder() {
  return [...document.getElementById('ftag-order').querySelectorAll('.ftag-pill')].map(p=>p.dataset.tag)
}
function addFilterTagToProfile(tag, btn) {
  btn.remove(); _formModified=true
  const container=document.getElementById('ftag-order')
  const pill=document.createElement('div'); pill.className='ftag-pill'; pill.draggable=true; pill.dataset.tag=tag
  pill.innerHTML=`<span class="drag-handle">⠿</span>${esc(tag)}<button class="rm-tag" type="button" onclick="removeFilterTag(this)" title="Remove">×</button>`
  container.appendChild(pill); initFilterTagDrag()
}
function removeFilterTag(btn) {
  const pill=btn.closest('.ftag-pill'); const tag=pill.dataset.tag; pill.remove(); _formModified=true
  const wrap=document.querySelector('.ftag-avail')
  if (wrap) { const chip=document.createElement('button'); chip.type='button'; chip.className='ftag-chip'; chip.dataset.tag=tag; chip.textContent=tag; chip.onclick=()=>addFilterTagToProfile(tag,chip); wrap.appendChild(chip) }
}

// ── Project Views ─────────────────────────────────────────────────────────────
function renderViewSidebar() {
  const list=document.getElementById('list-views'); if(!list) return
  list.innerHTML=(DATA.filterViews||[]).map(v=>{
    const dirty=!!PENDING[`view:${v.id}`]
    const enabled=v.visible!==false
    return `<li class="sb-item${curSection==='view'&&curId===v.id?' active':''}${enabled?'':' sb-disabled'}" draggable="true" data-id="${v.id}" onclick="editView('${v.id}')">
      ${sbSwitchHtml('view',v.id,enabled)}
      <span class="sb-item-name">${esc(v.label)}</span>
      ${dirty?`<button class="sb-floppy" onclick="event.stopPropagation();applyPending('view','${v.id}')" title="Unsaved — click to save">💾</button>`:''}
      <span class="sb-period">#${esc(v.tag)}</span>
    </li>`
  }).join('')
  initViewDrag()
}
function initViewDrag() {
  let dragId=null
  document.querySelectorAll('#list-views .sb-item').forEach(li=>{
    li.addEventListener('dragstart', e=>{ dragId=li.dataset.id; li.classList.add('dragging'); e.dataTransfer.effectAllowed='move' })
    li.addEventListener('dragend', ()=>{ li.classList.remove('dragging'); document.querySelectorAll('#list-views .sb-item').forEach(i=>i.classList.remove('drag-over')) })
    li.addEventListener('dragover', e=>{ e.preventDefault(); document.querySelectorAll('#list-views .sb-item').forEach(i=>i.classList.remove('drag-over')); if(li.dataset.id!==dragId)li.classList.add('drag-over') })
    li.addEventListener('dragleave', ()=>li.classList.remove('drag-over'))
    li.addEventListener('drop', e=>{
      e.preventDefault(); const tgt=li.dataset.id; if(!dragId||dragId===tgt) return
      const from=DATA.filterViews.findIndex(v=>v.id===dragId), to=DATA.filterViews.findIndex(v=>v.id===tgt)
      if(from<0||to<0) return
      DATA.filterViews.splice(to,0,DATA.filterViews.splice(from,1)[0])
      postData().then(()=>renderViewSidebar())
    })
  })
}
function editView(id) {
  if (curSection!=='view'||curId!==id) stashCurrentForm()
  curSection='view'; curId=id
  const v=getPendingOrData('view',id); renderViewSidebar(); if(!v) return
  _formModified=false
  document.getElementById('main').innerHTML=viewForm(v)
  document.getElementById('main').scrollTop=0
  showTopbar('view',v); initCoverDrag('cg-view'); attachFormChangeListener()
  setTimeout(()=>updateCvGridRows('cg-view'),0)
}
function newView() {
  stashCurrentForm()
  if (!DATA.filterViews) DATA.filterViews=[]
  curSection='view'; curId='view_'+Date.now()
  const blank={id:curId,label:'',tag:'',columns:6,aspectRatio:'3/2',projectOrder:[],visible:true}
  _formModified=false
  document.getElementById('main').innerHTML=viewForm(blank)
  document.getElementById('main').scrollTop=0
  showTopbar('view',blank); initCoverDrag('cg-view'); attachFormChangeListener()
  setTimeout(()=>updateCvGridRows('cg-view'),0)
}
function viewForm(v) {
  const _cs = v.cardSizes || {}
  const defaultSlots = c => _cs[c.id]==='featured'?2:_cs[c.id]==='wide'?3:1
  const allCards = []
  DATA.projects.filter(p=>p.visible!==false).forEach(p => {
    const subs=(p.subprojects||[]).filter(s=>s.visible!==false)
    if (subs.length && p.inSelection===false) {
      subs.forEach(sub => allCards.push({
        id:`${p.id}__${sub.id}`, title:sub.title, _parentTitle:p.title,
        _parentId:p.id, _subId:sub.id,
        coverImage:sub.coverImage, images:sub.images||[],
        filterTags:sub.filterTags||'', inSelection:sub.inSelection!==false,
        cardSize:sub.cardSize||'default'
      }))
    } else {
      allCards.push(p)
    }
  })
  let viewCards=v.id==='all'
    ?allCards.filter(c=>c.inSelection!==false)
    :allCards.filter(c=>v.tag&&(c.filterTags||'').split(' ').includes(v.tag))
  const rawOrder=v.projectOrder||[]
  // Normalise legacy parent IDs → expanded composite IDs
  const order=rawOrder.flatMap(id=>{
    if (allCards.find(c=>c.id===id)) return [id]
    const subs=allCards.filter(c=>c.id.startsWith(id+'__')); return subs.length?subs.map(c=>c.id):[id]
  })
  if (order.length) {
    const ordered=order.map(id=>viewCards.find(c=>c.id===id)).filter(Boolean)
    const rest=viewCards.filter(c=>!order.includes(c.id))
    viewCards=[...ordered,...rest]
  }
  const cols=DATA.gridSettings?.columns||6
  const ratio=DATA.gridSettings?.aspectRatio||'3/2'
  const hint=v.id==='all'
    ?'Showing projects/sections marked "Include in All". Drag to reorder — hover a card to set its column span (1 / 2 / 3).'
    :`Showing projects tagged "${v.tag||'—'}". Drag to reorder — hover to set column span.`
  return `
  <div class="form-head">${esc(v.label)||'New View'}</div>
  <form onsubmit="saveView(event)">
    <div class="grid2">
      <div class="fg"><label>Label</label><input type="text" name="label" value="${esc(v.label)}" required oninput="updateHead(this.value);document.getElementById('ftb-title').textContent=this.value||'New View'"></div>
      <div class="fg"><label>Tag (filter key)</label><input type="text" name="tag" value="${esc(v.tag)}"${v.id==='all'?' readonly style="opacity:.5"':''}></div>
    </div>
    <div class="sec-label">Project Order &amp; Layout</div>
    <p class="cover-hint">${hint}</p>
    <div class="cv-grid" id="cg-view" style="--cv-cols:${cols};--cv-ratio:${ratio}">${viewCards.map((c,i)=>cvItemHtml(c,i,defaultSlots(c))).join('')}</div>
    ${v.id!=='all'?`<div class="actions"><button type="button" class="btn-del" onclick="deleteView()">Delete</button></div>`:''}
  </form>`
}
async function saveView(e) {
  e.preventDefault()
  if (!DATA.filterViews) DATA.filterViews=[]
  const fd=new FormData(e.target); const item=collectViewItem(fd)
  const idx=DATA.filterViews.findIndex(v=>v.id===curId)
  if (idx>=0) DATA.filterViews[idx]=item; else DATA.filterViews.push(item)
  await postData(); delete PENDING[`view:${curId}`]; _formModified=false
  flashSaved('ftb-saved'); renderViewSidebar(); updateDirtyCount()
}
async function deleteView() {
  if (!confirm('Delete this view?')) return
  DATA.filterViews=(DATA.filterViews||[]).filter(v=>v.id!==curId)
  delete PENDING[`view:${curId}`]; await postData()
  curSection=null; curId=null; hideTopbar(); renderViewSidebar(); updateDirtyCount()
  document.getElementById('main').innerHTML='<div class="empty"><h2>Deleted</h2><p>Choose another entry or add a new one.</p></div>'
}

// ── Recruiter Profiles ────────────────────────────────────────────────────────
function renderProfileSidebar() {
  const list=document.getElementById('list-profiles'); if(!list) return
  list.innerHTML=(DATA.recruiterProfiles||[]).map(rp=>{
    const dirty=!!PENDING[`profile:${rp.id}`]
    const enabled=rp.visible!==false
    return `<li class="sb-item${curSection==='profile'&&curId===rp.id?' active':''}${enabled?'':' sb-disabled'}" draggable="true" data-id="${rp.id}" onclick="editProfile('${rp.id}')">
      ${sbSwitchHtml('profile',rp.id,enabled)}
      <span class="sb-item-name">${esc(rp.label)}</span>
      ${dirty?`<button class="sb-floppy" onclick="event.stopPropagation();applyPending('profile','${rp.id}')" title="Unsaved — click to save">💾</button>`:''}
      <span class="sb-period">${esc(rp.tag)}</span>
    </li>`
  }).join('')
  initProfileDrag()
}
function initProfileDrag() {
  let dragId=null
  document.querySelectorAll('#list-profiles .sb-item').forEach(li=>{
    li.addEventListener('dragstart', e=>{ dragId=li.dataset.id; li.classList.add('dragging'); e.dataTransfer.effectAllowed='move' })
    li.addEventListener('dragend', ()=>{ li.classList.remove('dragging'); document.querySelectorAll('#list-profiles .sb-item').forEach(i=>i.classList.remove('drag-over')) })
    li.addEventListener('dragover', e=>{ e.preventDefault(); document.querySelectorAll('#list-profiles .sb-item').forEach(i=>i.classList.remove('drag-over')); if(li.dataset.id!==dragId)li.classList.add('drag-over') })
    li.addEventListener('dragleave', ()=>li.classList.remove('drag-over'))
    li.addEventListener('drop', e=>{
      e.preventDefault(); const tgt=li.dataset.id; if(!dragId||dragId===tgt) return
      const from=DATA.recruiterProfiles.findIndex(r=>r.id===dragId), to=DATA.recruiterProfiles.findIndex(r=>r.id===tgt)
      if(from<0||to<0) return
      DATA.recruiterProfiles.splice(to,0,DATA.recruiterProfiles.splice(from,1)[0])
      postData().then(()=>renderProfileSidebar())
    })
  })
}
function editProfile(id) {
  if (curSection!=='profile'||curId!==id) stashCurrentForm()
  curSection='profile'; curId=id
  const rp=getPendingOrData('profile',id); renderProfileSidebar(); if(!rp) return
  _formModified=false
  document.getElementById('main').innerHTML=profileForm(rp)
  document.getElementById('main').scrollTop=0
  showTopbar('profile',rp); initCoverDrag('cg-profile'); initFilterTagDrag(); attachFormChangeListener()
  setTimeout(()=>updateCvGridRows('cg-profile'),0)
}
function newProfile() {
  stashCurrentForm()
  if (!DATA.recruiterProfiles) DATA.recruiterProfiles=[]
  curSection='profile'; curId='rp_'+Date.now()
  const blank={id:curId,label:'',tag:'',filterTags:[],projectOrder:[],visible:true}
  _formModified=false
  document.getElementById('main').innerHTML=profileForm(blank)
  document.getElementById('main').scrollTop=0
  showTopbar('profile',blank); initCoverDrag('cg-profile'); initFilterTagDrag(); attachFormChangeListener()
  setTimeout(()=>updateCvGridRows('cg-profile'),0)
}
function profileForm(rp) {
  const ALL_TAGS=(DATA.filterViews||[]).filter(v=>v.id!=='all'&&v.tag).map(v=>v.tag)
  const activeTags=Array.isArray(rp.filterTags)?rp.filterTags:(rp.filterTags||'').split(' ').filter(Boolean)
  const available=ALL_TAGS.filter(t=>!activeTags.includes(t))
  const pillsHtml=activeTags.map(t=>`<div class="ftag-pill" draggable="true" data-tag="${t}"><span class="drag-handle">⠿</span>${esc(t)}<button class="rm-tag" type="button" onclick="removeFilterTag(this)" title="Remove">×</button></div>`).join('')
  const availHtml=available.map(t=>`<button type="button" class="ftag-chip" data-tag="${t}" onclick="addFilterTagToProfile('${t}',this)">${t}</button>`).join('')
  // Build expanded card list (same logic as viewForm)
  const _cs = rp.cardSizes || {}
  const defaultSlots = c => _cs[c.id]==='featured'?2:_cs[c.id]==='wide'?3:1
  const allCards=[]
  DATA.projects.filter(p=>p.visible!==false).forEach(p=>{
    const subs=(p.subprojects||[]).filter(s=>s.visible!==false)
    if (subs.length&&p.inSelection===false) {
      subs.forEach(sub=>allCards.push({
        id:`${p.id}__${sub.id}`,title:sub.title,_parentTitle:p.title,
        _parentId:p.id,_subId:sub.id,
        coverImage:sub.coverImage,images:sub.images||[],
        filterTags:sub.filterTags||'',inSelection:sub.inSelection!==false,
        cardSize:sub.cardSize||'default'
      }))
    } else { allCards.push(p) }
  })
  const rawOrder=rp.projectOrder||[]
  // Normalise legacy parent IDs → expanded composite IDs
  const order=rawOrder.flatMap(id=>{
    if (allCards.find(c=>c.id===id)) return [id]
    const subs=allCards.filter(c=>c.id.startsWith(id+'__')); return subs.length?subs.map(c=>c.id):[id]
  })
  let projs
  if (order.length) {
    const ordered=order.map(id=>allCards.find(c=>c.id===id)).filter(Boolean)
    const rest=allCards.filter(c=>!order.includes(c.id))
    projs=[...ordered,...rest]
  } else if (activeTags.length) {
    // Default: sort by filterTag priority, then DATA.projects order
    const tagScore=c=>{ for(let i=0;i<activeTags.length;i++) if((c.filterTags||'').split(' ').includes(activeTags[i])) return i; return activeTags.length }
    projs=[...allCards].sort((a,b)=>tagScore(a)-tagScore(b))
  } else {
    projs=allCards
  }
  const cols=DATA.gridSettings?.columns||6
  const ratio=DATA.gridSettings?.aspectRatio||'3/2'
  return `
  <div class="form-head">${esc(rp.label)||'New Profile'}</div>
  <form onsubmit="saveProfile(event)">
    <div class="grid2">
      <div class="fg"><label>Label</label><input type="text" name="label" value="${esc(rp.label)}" required oninput="updateHead(this.value);document.getElementById('ftb-title').textContent=this.value||'New Profile'"></div>
      <div class="fg"><label>Tag (profile key)</label><input type="text" name="tag" value="${esc(rp.tag)}" required></div>
    </div>
    <div class="sec-label">Filter Tags (ordered)</div>
    <p class="cover-hint">These tags define what appears in the Shift+P panel for this profile. Drag to reorder.</p>
    <div class="ftag-order" id="ftag-order">${pillsHtml}</div>
    <p class="cover-hint" style="margin-top:10px">Add tags:</p>
    <div class="ftag-wrap ftag-avail">${availHtml}</div>
    <div class="sec-label">Project Order &amp; Layout</div>
    <p class="cover-hint">Order shown when this recruiter profile is active. Drag to reorder — hover a card to set its column span (1 / 2 / 3). Default order: profile tags priority → admin project order.</p>
    <div class="cv-grid" id="cg-profile" style="--cv-cols:${cols};--cv-ratio:${ratio}">${projs.map((c,i)=>cvItemHtml(c,i,defaultSlots(c))).join('')}</div>
    <div class="actions">
      <button type="button" class="btn-del" onclick="deleteProfile()">Delete</button>
    </div>
  </form>`
}
async function saveProfile(e) {
  e.preventDefault()
  if (!DATA.recruiterProfiles) DATA.recruiterProfiles=[]
  const fd=new FormData(e.target); const item=collectProfileItem(fd)
  const idx=DATA.recruiterProfiles.findIndex(r=>r.id===curId)
  if (idx>=0) DATA.recruiterProfiles[idx]=item; else DATA.recruiterProfiles.push(item)
  await postData(); delete PENDING[`profile:${curId}`]; _formModified=false
  flashSaved('ftb-saved'); renderProfileSidebar(); updateDirtyCount()
}
async function deleteProfile() {
  if (!confirm('Delete this profile?')) return
  DATA.recruiterProfiles=(DATA.recruiterProfiles||[]).filter(r=>r.id!==curId)
  delete PENDING[`profile:${curId}`]; await postData()
  curSection=null; curId=null; hideTopbar(); renderProfileSidebar(); updateDirtyCount()
  document.getElementById('main').innerHTML='<div class="empty"><h2>Deleted</h2><p>Choose another entry or add a new one.</p></div>'
}

init()
</script>
